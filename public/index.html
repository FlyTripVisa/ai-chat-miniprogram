<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<meta name="theme-color" content="#000000" />
		<title>AI 🐲 Robot</title>
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--bg: #000000;
				--surface: #111111;
				--surface-2: #1a1a1a;
				--border-color: #2a2a2a;
				--text-color: #f5f5f5;
				--text-light: #a3a3a3;
				--user-msg-bg: #2d1b00;
				--assistant-msg-bg: #1a1a1a;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
				-webkit-tap-highlight-color: transparent;
			}

			html, body {
				height: 100%;
				background-color: var(--bg);
			}

			body {
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
					Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 0;
				display: flex;
				flex-direction: column;
				height: 100dvh; /* Better mobile viewport handling */
			}

			header {
				text-align: center;
				padding: 1rem;
				border-bottom: 1px solid var(--border-color);
				background-color: var(--surface);
				flex-shrink: 0;
			}

			h1 {
				font-size: 1.25rem;
				color: var(--primary-color);
				font-weight: 600;
			}

			header p {
				font-size: 0.85rem;
				color: var(--text-light);
				margin-top: 0.25rem;
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				flex: 1;
				overflow: hidden;
				position: relative;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem 0.75rem;
				background-color: var(--bg);
				scroll-behavior: smooth;
				-webkit-overflow-scrolling: touch;
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem 1rem;
				border-radius: 18px;
				max-width: 85%;
				animation: fadeIn 0.2s ease-in;
			}

			@keyframes fadeIn {
				from { opacity: 0; transform: translateY(5px); }
				to { opacity: 1; transform: translateY(0); }
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
				word-break: break-word;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				align-self: flex-end;
				margin-left: auto;
				border-bottom-right-radius: 4px;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				align-self: flex-start;
				border: 1px solid var(--border-color);
				border-bottom-left-radius: 4px;
			}

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: var(--surface);
				gap: 0.5rem;
				flex-shrink: 0;
				padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); /* iPhone notch safe */
			}

			#user-input {
				flex: 1;
				padding: 0.75rem 1rem;
				border: 1px solid var(--border-color);
				border-radius: 24px;
				font-family: inherit;
				font-size: 16px; /* Prevents iOS zoom */
				resize: none;
				min-height: 48px;
				max-height: 120px;
				background-color: var(--surface-2);
				color: var(--text-color);
				outline: none;
			}

			#user-input:focus {
				border-color: var(--primary-color);
			}

			#user-input::placeholder {
				color: var(--text-light);
			}

			#send-button {
				padding: 0 1.25rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 24px;
				cursor: pointer;
				transition: background-color 0.2s;
				font-weight: 600;
				min-height: 48px;
				min-width: 64px;
				font-size: 0.95rem;
			}

			#send-button:active {
				transform: scale(0.96);
			}

			#send-button:hover {
				background-color: var(--primary-hover);
			}

			#send-button:disabled {
				background-color: var(--surface-2);
				color: var(--text-light);
				cursor: not-allowed;
			}

			.typing-indicator {
				display: none;
				font-style: italic;
				color: var(--text-light);
				padding: 0.5rem 1rem;
				font-size: 0.9rem;
			}

			.typing-indicator.visible {
				display: block;
			}

			footer {
				display: none; /* Hide on mobile to save space */
			}

			/* Desktop only */
			@media (min-width: 768px) {
				body {
					padding: 1rem;
				}
				
				.chat-container {
					border: 1px solid var(--border-color);
					border-radius: 12px;
					height: calc(100vh - 180px);
				}

				footer {
					display: block;
					margin-top: 1rem;
					text-align: center;
					font-size: 0.85rem;
					color: var(--text-light);
				}

				h1 {
					font-size: 1.5rem;
				}
			}

			/* Scrollbar styling for dark mode */
			.chat-messages::-webkit-scrollbar {
				width: 6px;
			}

			.chat-messages::-webkit-scrollbar-track {
				background: var(--bg);
			}

			.chat-messages::-webkit-scrollbar-thumb {
				background: var(--border-color);
				border-radius: 3px;
			}
		</style>
	</head>
	<body>
		<header>
			<h1>AI 🐲 Robot</h1>
			<p>Powered by Fly 🐲 AI - FlyTripVisa.site</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>
						Hello! I'm an AI 🐲 Robot app powered by FlyTripVisa. How can
						I help you today?
					</p>
				</div>
			</div>

			<div class="typing-indicator" id="typing-indicator">
				🐲 AI is thinking...
			</div>

			<div class="message-input">
				<textarea
					id="user-input"
					placeholder="Message..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<footer>
			<p>AI 🐲 Robot &copy; 2025</p>
		</footer>

		<!-- Chat app script -->
		<script src="chat.js"></script>
		<script>
			// Auto-resize textarea
			const textarea = document.getElementById('user-input');
			textarea.addEventListener('input', function() {
				this.style.height = 'auto';
				this.style.height = Math.min(this.scrollHeight, 100) + 'px';
			});

			// Enter to send, Shift+Enter for newline
			textarea.addEventListener('keydown', function(e) {
				if (e.key === 'Enter' && !e.shiftKey) {
					e.preventDefault();
					document.getElementById('send-button').click();
				}
			});
		</script>
	</body>
</html>
